vision:
  backbone: dinov2_s
  pretrained: true
  freeze: true
  # Local vision backbone folder. Large downloaded files are ignored by Git.
  assets_dir: vision_backbones
  # Offline option: clone https://github.com/facebookresearch/dinov2 into this folder.
  dinov2_repo: vision_backbones/dinov2
  # Torch Hub cache/checkpoint directory used by DINOv2.
  torch_hub_dir: vision_backbones/torch_hub
  # Optional local ResNet checkpoint. Leave empty to use torchvision initialization.
  resnet_weights: ""
  image_height: 224
  image_width: 224
  token_dim: 512
history:
  max_keyframes: 8
  interval: 4
trajectory:
  history_len: 16
  pose_delta_dim: 4
model:
  hidden_dim: 512
  num_heads: 8
  num_layers: 2
  dropout: 0.1
  max_milestones: 8
training:
  batch_size: 16
  epochs: 10
  lr: 0.00025
  latent_loss_weight: 1.0
  progress_loss_weight: 1.0
  cost_loss_weight: 1.0

