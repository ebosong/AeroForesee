vision:
  backbone: dinov2_s
  pretrained: true
  freeze: true
  # Leave empty to use Torch Hub online/cache resolution.
  # Offline option: clone https://github.com/facebookresearch/dinov2 here and set this path.
  dinov2_repo: ""
  # Optional Torch Hub cache directory. Empty means PyTorch default, usually ~/.cache/torch/hub.
  torch_hub_dir: ""
  image_height: 224
  image_width: 224
  token_dim: 512
history:
  max_keyframes: 8
  interval: 4
trajectory:
  history_len: 16
  pose_delta_dim: 4
model:
  hidden_dim: 512
  num_heads: 8
  num_layers: 2
  dropout: 0.1
  max_milestones: 8
training:
  batch_size: 16
  epochs: 10
  lr: 0.00025
  latent_loss_weight: 1.0
  progress_loss_weight: 1.0
  cost_loss_weight: 1.0

